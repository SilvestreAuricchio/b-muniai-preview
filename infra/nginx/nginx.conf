events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # ── Upstream pools ──────────────────────────────────────────────────
    upstream web_pool      { server web:30000; }
    upstream bff_pool      { server bff:30001; }
    upstream backend_pool  { server backend:30002; least_conn; }
    upstream rabbitmq_ui   { server rabbitmq:15672; }
    upstream grafana_ui    { server grafana:3000; }
    upstream prometheus_ui { server prometheus:9090; }

    # ── Common proxy headers (macro via map trick — applied per block) ────
    proxy_http_version 1.1;
    proxy_set_header   Connection        "";          # enable keepalive to upstream
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;

    # ── HTTP → HTTPS redirect ───────────────────────────────────────────
    server {
        listen 80;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS ────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;

        ssl_certificate     /etc/nginx/certs/localhost.crt;
        ssl_certificate_key /etc/nginx/certs/localhost.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # React SPA — catch-all
        location / {
            proxy_pass http://web_pool;
            proxy_set_header Host $host;
        }

        # BFF  →  strip /bff prefix before forwarding
        location /bff/ {
            proxy_pass http://bff_pool/;
            proxy_set_header Host $host;
        }

        # Backend API  →  strip /api prefix before forwarding
        location /api/ {
            proxy_pass http://backend_pool/;
            proxy_set_header Host $host;
        }

        # RabbitMQ management UI
        location /rabbitmq/ {
            proxy_pass http://rabbitmq_ui/;
            proxy_set_header Host $host;
        }

        # Grafana — must keep /grafana/ prefix; Grafana handles sub-path internally
        location /grafana/ {
            proxy_pass         http://grafana_ui/grafana/;
            proxy_set_header   Host $host;
        }

        # Prometheus — strip /prometheus prefix; prometheus handles --web.route-prefix
        location /prometheus/ {
            proxy_pass http://prometheus_ui/;
            proxy_set_header Host $host;
        }
    }
}
