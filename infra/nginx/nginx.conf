events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Docker's internal DNS — defers upstream resolution to request time so
    # nginx starts successfully even when backend containers are still booting.
    resolver 127.0.0.11 valid=10s ipv6=off;

    proxy_http_version 1.1;
    proxy_set_header   Connection        "";
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;

    # ── HTTP → HTTPS redirect ───────────────────────────────────────────
    server {
        listen 80;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS ────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;

        ssl_certificate     /etc/nginx/certs/localhost.crt;
        ssl_certificate_key /etc/nginx/certs/localhost.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # BFF — strip /bff prefix before forwarding
        location /bff/ {
            set $upstream_bff bff:30001;
            rewrite ^/bff/(.*) /$1 break;
            proxy_pass http://$upstream_bff;
            proxy_set_header Host              $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Backend API — strip /api prefix before forwarding
        location /api/ {
            set $upstream_backend backend:30002;
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://$upstream_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # RabbitMQ management UI — strip /rabbitmq prefix
        location /rabbitmq/ {
            set $upstream_rabbitmq rabbitmq:15672;
            rewrite ^/rabbitmq/(.*) /$1 break;
            proxy_pass http://$upstream_rabbitmq;
            proxy_set_header Host              $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Grafana — keep /grafana/ prefix; Grafana handles sub-path internally
        location /grafana/ {
            set $upstream_grafana grafana:3000;
            proxy_pass http://$upstream_grafana;
            proxy_set_header Host              $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Prometheus — strip /prometheus prefix
        location /prometheus/ {
            set $upstream_prometheus prometheus:9090;
            rewrite ^/prometheus/(.*) /$1 break;
            proxy_pass http://$upstream_prometheus;
            proxy_set_header Host              $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # React SPA — catch-all (must be last)
        location / {
            set $upstream_web web:30000;
            proxy_pass http://$upstream_web;
            proxy_set_header Host              $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
